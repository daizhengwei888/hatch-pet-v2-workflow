name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check pillow numpy pyyaml

      - name: Compile scripts
        run: python -m compileall -q plugins/hatch-pet-v2-workflow/skills/hatch-pet/scripts

      - name: Run tests
        run: >-
          python -m unittest discover
          -s plugins/hatch-pet-v2-workflow/skills/hatch-pet/tests
          -p 'test_*.py'
